name: lits-seg
channels:
  - pytorch
  - nvidia
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - scipy>=1.11
  - tqdm>=4.65
  - pyyaml>=6.0
  - pip:
    - torch==2.2.2
    - torchvision==0.17.2
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - nibabel==5.2.1
    - segmentation-models-pytorch==0.3.4
    - wandb==0.17.9
    - python-dotenv==1.0.1
    - SimpleITK==2.3.1
